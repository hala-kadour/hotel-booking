name: hotel_booking
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.3
  go_router: ^17.1.0
  google_nav_bar: ^5.0.7
  iconsax: ^0.0.8
  readmore: ^3.0.0
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/Plus Jakarta Sans/PlusJakartaSans-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Plus Jakarta Sans/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/Plus Jakarta Sans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/Plus Jakarta Sans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Plus Jakarta Sans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Plus Jakarta Sans/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/Plus Jakarta Sans/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter/Inter-Black.ttf
          weight: 900
  uses-material-design: true
  assets:
    - assets/images/pngs/
    - assets/images/svgs/
